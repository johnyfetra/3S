services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: school_erp
      POSTGRES_USER: school
      POSTGRES_PASSWORD: school
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_DSN: postgresql+asyncpg://school:school@postgres:5432/school_erp
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: replace-with-a-strong-secret
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:8001
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8001
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
